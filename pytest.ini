[pytest]
minversion = 6.0
testpaths =
    tests
addopts =
    -ra
    --strict-markers
    --doctest-glob=\*.rst
    --tb=short
    --ignore-glob=\*/.ipynb_checkpoints
markers =
    regression: image/PDF regression coverage that is not part of the default fast suite
    slow: tests that are intentionally slower than the default unit suite
filterwarnings =
    ignore::DeprecationWarning:importlib
