name: Build

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  version:
    runs-on: 'ubuntu-latest'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checking out the repo
        uses: actions/checkout@v4

      - name: Figure out version string
        id: version
        shell: sh
        run: |
          # get the latest commit hash in the short form
          COMMIT=$(git rev-parse --short HEAD)
          # get the latest commit date in the form of YYYYmmdd
          DATE=$(git log -1 --format=%cd --date=format:'%y%m%d%H%M')
          echo "version=${DATE}-${COMMIT}" >> "$GITHUB_OUTPUT"

  build:
    needs: [version]
    # convert this to a matrix if builds differ between platforms
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # preferring older OS versions for better backward compat,
        # the build platform may be the oldest platform it works on
        os: [ 'ubuntu-22.04', 'ubuntu-22.04-arm', 'windows-2022', 'macos-14', 'macos-13' ]
        # [ 'ubuntu-22.04', 'windows-latest', 'macos-latest']
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:

      - name: Checking out the repo
        uses: actions/checkout@v4

      # see *py_ver* in ci/update.py
      - name: Setting up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_for_testing.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --progress-bar=off -r requirements.txt
          python -m pip install --progress-bar=off -r requirements_for_testing.txt

      - name: Run fast tests
        run: python -m pytest -q

      - name: Get OS and machine architecture
        id: os
        shell: python
        run: |
            import os, platform
            machine = platform.machine().replace("x86_", "intel").replace("AMD", "intel")
            with open(os.environ["GITHUB_OUTPUT"], "a") as fd:
                fd.write(f"res={platform.system()}-{machine}\n")

      - name: Validate macOS release secrets
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
          MACOS_NOTARY_KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
        shell: sh
        run: |
          signing_count=0
          [ -n "$MACOS_CODESIGN_IDENTITY" ] && signing_count=$((signing_count + 1))
          [ -n "$MACOS_CERTIFICATE_P12_BASE64" ] && signing_count=$((signing_count + 1))
          [ -n "$MACOS_CERTIFICATE_PASSWORD" ] && signing_count=$((signing_count + 1))
          if [ "$signing_count" -ne 0 ] && [ "$signing_count" -ne 3 ]; then
            echo "Configure all macOS signing secrets or none of them." >&2
            exit 1
          fi

          notary_count=0
          [ -n "$MACOS_NOTARY_KEY_ID" ] && notary_count=$((notary_count + 1))
          [ -n "$MACOS_NOTARY_ISSUER" ] && notary_count=$((notary_count + 1))
          [ -n "$MACOS_NOTARY_KEY_P8" ] && notary_count=$((notary_count + 1))
          if [ "$notary_count" -ne 0 ] && [ "$notary_count" -ne 3 ]; then
            echo "Configure all macOS notary secrets or none of them." >&2
            exit 1
          fi

          if [ "$notary_count" -ne 0 ] && [ "$signing_count" -ne 3 ]; then
            echo "Notarization requires the macOS signing secrets to be configured too." >&2
            exit 1
          fi

      - name: Import macOS signing certificate
        if: startsWith(matrix.os, 'macos') && secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != ''
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        shell: sh
        run: |
          CERT_PATH="$RUNNER_TEMP/liveft-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/liveft-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)$(uuidgen)"
          export CERT_PATH
          python -c 'import base64, os; from pathlib import Path; Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["MACOS_CERTIFICATE_P12_BASE64"]))'
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write macOS notary API key
        if: startsWith(matrix.os, 'macos') && secrets.MACOS_NOTARY_KEY_ID != '' && secrets.MACOS_NOTARY_ISSUER != '' && secrets.MACOS_NOTARY_KEY_P8 != ''
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
          MACOS_NOTARY_KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
        shell: sh
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
          umask 077
          printf '%s' "$MACOS_NOTARY_KEY_P8" > "$NOTARY_KEY_PATH"
          {
            echo "LIVEFT_NOTARY_KEY_FILE=$NOTARY_KEY_PATH"
            echo "LIVEFT_NOTARY_KEY_ID=$MACOS_NOTARY_KEY_ID"
            echo "LIVEFT_NOTARY_ISSUER=$MACOS_NOTARY_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Build
        if: ${{ !startsWith(matrix.os, 'macos') }}
        env:
          VERSION: ${{ needs.version.outputs.version }}
        shell: sh
        run: |
          OS=${{ steps.os.outputs.res }}
          sh scripts/build_dist.sh "$VERSION" "$OS"

      - name: Build / Sign / Notarize macOS Release
        if: startsWith(matrix.os, 'macos')
        env:
          VERSION: ${{ needs.version.outputs.version }}
          LIVEFT_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          LIVEFT_NOTARY_KEY_FILE: ${{ env.LIVEFT_NOTARY_KEY_FILE }}
          LIVEFT_NOTARY_KEY_ID: ${{ env.LIVEFT_NOTARY_KEY_ID }}
          LIVEFT_NOTARY_ISSUER: ${{ env.LIVEFT_NOTARY_ISSUER }}
          LIVEFT_KEEP_APP_AFTER_DMG: '1'
        shell: sh
        run: |
          OS=${{ steps.os.outputs.res }}
          if [ "${{ matrix.os }}" = "macos-13" ]; then
            # workaround 'hdiutil: create failed - Resource busy'
            # https://github.com/actions/runner-images/issues/7522#issuecomment-1556766641
            sudo pkill -9 XProtect >/dev/null || true;
            while pgrep XProtect; do sleep 3; done;
          fi
          sh scripts/release_macos.sh "$VERSION" "$OS"

      - name: Remove temporary macOS keychain
        if: always() && startsWith(matrix.os, 'macos') && secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != ''
        shell: sh
        run: security delete-keychain "$RUNNER_TEMP/liveft-signing.keychain-db" || true

      - name: Check what was created
        shell: sh
        run: ls -la dist

      - name: Store built packages for publishing later
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: dist/*
          overwrite: true
          if-no-files-found: 'error'

  publish:
    needs: [build]
    runs-on: 'ubuntu-latest'
    steps:

      - name: Download previuously built package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: dist

      - name: Check contents
        run: |
          pwd
          ls -la dist
          [ "$(find dist -type f | wc -l)" -gt 0 ] # fails if no files where created

      - name: Release
        #if: false # disable for debugging, avoid publishing incomplete releases
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          draft: false
          prerelease: false
          tag_name: ${{ needs.build.outputs.version }}
          files: dist/*
